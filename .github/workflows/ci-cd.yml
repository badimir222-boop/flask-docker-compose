name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start containers
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 20

      - name: List running containers (debug)
        run: docker ps --format "table {{.Names}}\t{{.Status}}"

      - name: Test API endpoint
        run: curl -f http://localhost:5000/health

      - name: Test PostgreSQL
        run: docker compose exec database pg_isready -U postgres

      - name: Test Redis
        run: docker compose exec redis redis-cli ping

      - name: Show logs if failed
        if: failure()
        run: docker compose logs

      - name: Stop containers
        run: docker compose down

  notify:
    name: Send Telegram Notification
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            📦 Проект: flask-docker-compose
            🌿 Ветка: ${{ github.ref_name }}
            👤 Автор: ${{ github.actor }}
            🧪 Статус тестирования: ${{ needs.test.result }}
            🔗 Репозиторий: ${{ github.repository }}
